name: Download from User Input

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URLs to download (space-separated for multiple files)'
        required: true
        type: string
      mode:
        description: 'Download mode: normal (keep individual files) or zip (pack all into one archive)'
        required: false
        type: choice
        default: normal
        options:
          - normal
          - zip
      split_size:
        description: 'Split size for large files (e.g. 90m, 95m)'
        required: false
        type: string
        default: '90m'
      connections:
        description: 'Parallel connections per URL for faster download (1 to 16, default 4)'
        required: false
        type: string
        default: '4'
      custom_filename:
        description: 'Custom output filename (only works when downloading a single URL)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  process-download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y aria2 zip

      - name: Download and process files
        env:
          FILE_URLS: ${{ github.event.inputs.file_url }}
          MODE: ${{ github.event.inputs.mode }}
          SPLIT_SIZE: ${{ github.event.inputs.split_size }}
          CONNECTIONS: ${{ github.event.inputs.connections }}
          CUSTOM_FILENAME: ${{ github.event.inputs.custom_filename }}
        run: |
          set -e

          if ! [[ "$CONNECTIONS" =~ ^[0-9]+$ ]] || [ "$CONNECTIONS" -lt 1 ] || [ "$CONNECTIONS" -gt 16 ]; then
            CONNECTIONS=4
          fi

          if ! [[ "$SPLIT_SIZE" =~ ^[0-9]+[mMgG]$ ]]; then
            SPLIT_SIZE="90m"
          fi

          mkdir -p downloads tmp_downloads

          URL_ARRAY=($FILE_URLS)
          URL_COUNT=${#URL_ARRAY[@]}
          echo "Total URLs to download: $URL_COUNT"

          DOWNLOAD_FAILED=0

          for URL in "${URL_ARRAY[@]}"; do
            CLEAN_URL="${URL%%\?*}"
            CLEAN_URL="${CLEAN_URL%%#*}"
            FILENAME=$(basename "$CLEAN_URL")

            if [ "$URL_COUNT" -eq 1 ] && [ -n "$CUSTOM_FILENAME" ]; then
              FILENAME="$CUSTOM_FILENAME"
            fi

            if [ -z "$FILENAME" ] || [ "$FILENAME" = "/" ]; then
              FILENAME="download_$(date +%s)"
            fi

            echo "Downloading: $URL"
            echo "Output filename: $FILENAME"

            if aria2c \
              --split="$CONNECTIONS" \
              --max-connection-per-server="$CONNECTIONS" \
              --min-split-size=10M \
              --max-tries=5 \
              --retry-wait=5 \
              --connect-timeout=30 \
              --timeout=600 \
              --file-allocation=none \
              --auto-file-renaming=false \
              --console-log-level=notice \
              --dir="tmp_downloads" \
              --out="$FILENAME" \
              "$URL"; then
              SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo 0)
              SIZE_MB=$(( SIZE / 1024 / 1024 ))
              echo "Success: $FILENAME (${SIZE_MB} MB)"
            else
              echo "ERROR: Failed to download $URL"
              DOWNLOAD_FAILED=1
            fi
          done

          if [ "$DOWNLOAD_FAILED" -eq 1 ]; then
            echo "WARNING: One or more downloads failed. Continuing with successfully downloaded files."
          fi

          DOWNLOADED_COUNT=$(ls -1 tmp_downloads/ 2>/dev/null | wc -l)
          echo "Files downloaded successfully: $DOWNLOADED_COUNT"

          if [ "$DOWNLOADED_COUNT" -eq 0 ]; then
            echo "No files were downloaded. Exiting."
            exit 1
          fi

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"
            echo "Creating zip archive: $ARCHIVE_NAME"
            cd tmp_downloads
            zip -j "../downloads/$ARCHIVE_NAME" ./*
            cd ..
            echo "Archive ready: downloads/$ARCHIVE_NAME"
          else
            NUMERIC=$(echo "$SPLIT_SIZE" | sed 's/[^0-9]//g')
            UNIT=$(echo "$SPLIT_SIZE" | sed 's/[0-9]//g' | tr '[:upper:]' '[:lower:]')
            if [ "$UNIT" = "g" ]; then
              LIMIT_BYTES=$(( NUMERIC * 1024 * 1024 * 1024 ))
            else
              LIMIT_BYTES=$(( NUMERIC * 1024 * 1024 ))
            fi

            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")

              if [ "$SIZE" -gt "$LIMIT_BYTES" ]; then
                SIZE_MB=$(( SIZE / 1024 / 1024 ))
                echo "File $BASENAME is ${SIZE_MB}MB, splitting into ${SPLIT_SIZE} parts..."
                zip -s "$SPLIT_SIZE" "downloads/${BASENAME}.zip" -j "$FILE"
                echo "Split complete: $BASENAME"
              else
                cp "$FILE" "downloads/$BASENAME"
              fi
            done
          fi

          rm -rf tmp_downloads

          echo "Final files in downloads/:"
          ls -lh downloads/

      - name: Commit and push to repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mapfile -t ALL_FILES < <(git ls-files --others --modified --exclude-standard downloads/)

          TOTAL=${#ALL_FILES[@]}
          echo "Total files to commit: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit."
            exit 0
          fi

          BATCH_SIZE=5
          BATCH_NUM=0

          for (( i=0; i<TOTAL; i+=BATCH_SIZE )); do
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            BATCH=("${ALL_FILES[@]:i:BATCH_SIZE}")

            echo "Pushing batch $BATCH_NUM: files $((i+1))-$(( i + ${#BATCH[@]} )) of $TOTAL"

            git add "${BATCH[@]}"
            git commit -m "Add downloaded files - batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"

            echo "Batch $BATCH_NUM pushed successfully"
          done

          echo "Done. $TOTAL file(s) pushed in $BATCH_NUM batch(es)."